site_name: MantisBase Documentation
site_url: https://docs.mantisbase.com
site_description:  User and developer docs for navigating the use and integration of MantisBase, an open source, single-binary, lightweight BaaS toolkit written in C++.
site_author: MantisBase Team

docs_dir: content
site_dir: site

repo_url: https://github.com/allankoechke/mantisbase/
repo_name: allankoechke/mantisbase

use_directory_urls: false

theme:
  name: material
  custom_dir: content/overrides
  logo: guides/assets/mantisbase.svg
  favicon: guides/assets/favicon.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.footer
  icon:
    repo: material/github
  repo:
    url: https://github.com/allankoechke/mantisbase
    edit: false
  palette:
    # Palette for dark mode
    - scheme: slate
      primary: blue-grey
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - def_list
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
plugins:
  - search
extra_css:
  - stylesheets/doxide.css
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/tablesort@5.3.0/src/tablesort.min.js
  - https://cdn.jsdelivr.net/npm/tablesort@5.3.0/src/sorts/tablesort.number.js
  - javascripts/tablesort.js
nav:
  - Home: index.md
  - "Getting Started":
      - Setting Up: guides/installation.md
      - Docker: guides/docker.md
      - Embedding: guides/embedding.md
  - "Guides":
      - CMD: guides/cmd.md
      - API: guides/api.md
      - Authentication: guides/auth.md
      - Access Rules: guides/rules.md
      - File Handling: guides/files.md
      - Healthcheck: guides/healthcheck.md
      - JavaScript Scripting: guides/scripting.md
  - "C++ API Reference":
      - api/index.md
  - Contributing: https://github.com/allankoechke/mantisbase/issues
