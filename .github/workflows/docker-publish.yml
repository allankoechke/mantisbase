name: Docker build and push

on:
  workflow_call:
    inputs:
      version:
        description: 'Release version (e.g. v0.3.5 or 0.3.5)'
        required: true
        type: string
      image_name:
        description: 'Docker image name (default: mantisbase)'
        required: false
        type: string
        default: 'mantisbase'
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Set version (strip leading v)
        id: version
        run: |
          v="${{ inputs.version }}"
          echo "version=${v#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          file: ./docker/Dockerfile
          build-args: |
            MB_VERSION=${{ steps.version.outputs.version }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:latest
